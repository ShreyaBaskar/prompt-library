{% extends "base.html" %}
{% block title %}Sign Up — PromptLib{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">⬡ PromptLib</div>
    <h1 class="auth-title" data-i18n="signup">Sign Up</h1>
    <p class="auth-sub">Create your account for unlimited prompts &amp; personalization.</p>
    <form method="POST" class="auth-form">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" required placeholder="Your Name" class="input">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required placeholder="you@example.com" class="input">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="Min. 6 characters" class="input">
      </div>
      <button type="submit" class="btn btn-primary btn-full" data-i18n="signup">Create Account</button>
    </form>
    <p class="auth-footer">Already have an account? <a href="/login" data-i18n="login">Login</a></p>
  </div>
</div>
{% endblock %}
